# Tell Grafana to load any dashboard JSON dropped into /var/lib/grafana/dashboards
# (mounted from monitoring/grafana/dashboards). So the FL dashboard appears on boot.
apiVersion: 1
providers:
  - name: FL
    orgId: 1
    folder: ""
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
