project:
  name: "Privacy Preserving Federated Learning"

seed: 42

dataset:
  name: "MNIST"
  batch_size: 64
  num_workers: 2

model:
  num_classes: 10

training:
  epochs: 5
  learning_rate: 0.001
  device: "cuda"

paths:
  data_dir: "./data"
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"

federated:
  num_clients: 3
  num_rounds: 3
  local_epochs: 5