project:
  name: "Privacy Preserving Federated Learning"

seed: 42

dataset:
  name: "MNIST"
  batch_size: 64
  num_workers: 0

model:
  num_classes: 10

training:
  epochs: 5
  learning_rate: 0.001
  device: "cuda"

paths:
  data_dir: "./data"
  checkpoint_dir: "./checkpoints"
  log_dir: "./logs"

federated:
  num_clients: 2
  num_rounds: 10
  local_epochs: 2

async_training:
  min_updates: 1
  window_seconds: 15
  consistency_model: "eventual"
  max_staleness: 0   # drop updates staler than this; 0 = only base-consistent deltas aggregate
